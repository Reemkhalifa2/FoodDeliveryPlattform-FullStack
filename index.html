<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery</title>
    <link href="style\style.css" rel="stylesheet"/>    
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                Codeline Eats
            </h1>

            <input
                type="text"
                id="searchInput"
                class="field"
                placeholder="Search restaurants..."
            >

        </div>
    </header>

    <section class="container">
        <div class="filter-container">
            <button class="chip chip--active">
                All
            </button>

            <button class="chip">
                Arabic
            </button>

             <button class="chip">
                Indian
            </button>

            <button class="chip">
                Italian
            </button>

            <button class="chip">
                Bargars
            </button>

            <button class="chip">
                Japanese
            </button>

            <button class="chip">
                Healthy
            </button>

        </div>

    </section>

    <div id="errorMessage"></div>

    <main class="container">

        <div id="restaurantContainer" class="restaurant-grid">


        </div>

    </main>
    
</body>
</html>
