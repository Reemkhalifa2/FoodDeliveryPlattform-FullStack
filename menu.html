<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLine Eats</title>
    <link href="style/style.css" rel="stylesheet"/>    
    <link href="style/restaurant.css" rel="stylesheet"/>    
</head>
<body>

    <header class="header">
        <div class="container">

            <!-- Left -->
            <div class="header-left">
                <div class="logo">
                    <img src="images\burger.png" alt="logo">
                    <span>CodeLine Eats</span>
                </div>

                <div class="search-wrapper">
                    <div class="search-bar">
                        <img class="search-icon" src="images\search.png">
                        <input class="search-input" id="searchInput" placeholder="Search restaurants...">
                    </div>
                </div>
            </div>


            <!-- Right -->
            <div class="header-actions">

                <div class="location-picker">
                    <img class="action-icon" src="images/pin.png">
                    <span>Location</span>
                </div>

                <button class="cart-btn">
                    <img src="images/shopping-cart.png" alt="shping cart">
                </button>

            </div>

        </div>
    </header>
  </p>

            <p>
                <strong>Total</strong>
                <strong id="total">2.800 OMR</strong>
            </p>

            <button id="placeOrderBtn" class="btn-menu">
                Place Order
            </button>

        </div>

    </aside>

</main>
