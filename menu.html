<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Boom - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/menu.css">

</head>
<body>

    <div class="app-layout">
        <main class="main-content">
            
            <header id="restaurantInfo" class="restaurant-header">
                <button class="back-btn" onclick="history.back()">←</button>
                <div class="restaurant-header__meta">
                    <h1 class="restaurant-header__title" id="restaurant-name">Al Boom</h1>
                    <div class="restaurant-header__details" >
                        <span id="cuisine">Arabic</span> • 
                        <span class="rating">⭐ 4.6</span> • 
                        <span>25–35 min</span>
                    </div>
                </div>
            </header>

            <div id="categoryChips" class="category-chips-row">
                </div>

            <section class="section-block">
                <h2 class="section-title">COMBOS</h2>
                <div id="comboContainer" class="combos-grid">
                    </div>
            </section>

            <section class="section-block">
                <h2 class="section-title">MENU</h2>
                <div id="menuContainer" class="menu-list">
                    </div>
            </section>

        </main>

        <aside class="cart-sidebar">
            <div class="cart-card">
                <div class="cart-card__header">
                    <div class="cart-card__title">
                        <svg class="cart-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        <span>Your Cart</span>
                    </div>
                    <span id="cart-count" class="cart-count-badge">0</span>
                </div>

                <div id="cart-items-container" class="cart-items-list">
                    </div>

                <hr class="cart-divider">

                <div class="cart-totals">
                    <div class="totals-row">
                        <span>Subtotal</span>
                        <span id="subtotal">0.000 OMR</span>
                    </div>
                    <div class="totals-row">
                        <span>Delivery fee</span>
                        <span id="delivery-fee">0.500 OMR</span>
                    </div>
                    <hr class="cart-divider-light">
                    <div class="totals-row totals-row--final">
                        <span>Total</span>
                        <span id="total-price">0.500 OMR</span>
                    </div>
                </div>

                <button class="place-order-btn">Place Order</button>
                <div class="min-order-notice" id="min-order-notice">
                    Min order 2.000 OMR met ✓
                </div>
            </div>
        </aside>
    </div>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
