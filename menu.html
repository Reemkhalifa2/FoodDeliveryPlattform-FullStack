<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLine Eats|Menu</title>

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/menu.css">
</head>

<body>

    <!-- ==========================
            Main
    =========================== -->

    <main class="container menu-layout" id="menuContainer">

        <!-- ======================
                MENU
        ======================= -->

        <section class="menu-section">

            <div class="restaurant-info">

                <h2 id="restaurantName">
                    Restaurant Name
                </h2>

                <p id="restaurantCuisine">
                    Italian Cuisine
                </p>

            </div>


            <!-- Combos -->

            <h3 class="section-title">
                Combos
            </h3>

            <div id="comboContainer" class="cards-grid">

            </div>


            <!-- Menu -->

            <h3 class="section-title">
                Menu
            </h3>

            <div id="menuContainer" class="cards-grid">

            </div>

        </section>



        <!-- ======================
                CART
        ======================= -->

        <aside class="cart-sidebar" id="cartSidebar">

            <h2>Your Cart</h2>

            <div id="cartItems">

                <p class="empty-cart">
                    Your cart is empty.
                </p>

            </div>


            <div class="cart-summary">

                <div class="summary-row">

                    <span>Subtotal</span>

                    <span id="subtotal">
                        0.000 OMR
                    </span>

                </div>


                <div class="summary-row">

                    <span>Delivery Fee</span>

                    <span id="deliveryFee">
                        0.000 OMR
                    </span>

                </div>


                <div class="summary-row total-row">

                    <strong>Total</strong>

                    <strong id="total">
                        0.000 OMR
                    </strong>

                </div>


                <button
                    class="btn-menu"
                    id="placeOrderBtn">

                    Place Order

                </button>

            </div>

        </aside>

    </main>


    <!-- ==========================
        Mobile Cart Drawer
    =========================== -->

    <div class="cart-drawer" id="cartDrawer">

        <div class="drawer-header">

            <h2>Your Cart</h2>

            <button id="closeDrawer">
            </button>

        </div>

        <div id="mobileCartItems">

        </div>

        <div class="cart-summary">

            <div class="summary-row">

                <span>Subtotal</span>

                <span id="mobileSubtotal">
                    0.000 OMR
                </span>

            </div>

            <div class="summary-row">

                <span>Delivery Fee</span>

                <span id="mobileDeliveryFee">
                    0.000 OMR
                </span>

            </div>

            <div class="summary-row total-row">

                <strong>Total</strong>

                <strong id="mobileTotal">
                    0.000 OMR
                </strong>

            </div>

            <button class="btn-menu">

                Place Order

            </button>

        </div>

    </div>

    <script src="api.js"></script>
    <script type="module" src="app.js"></script>

</body>
</html>
