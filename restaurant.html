<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLine Eats</title>
    <link href="style/style.css" rel="stylesheet"/>    
    <link href="style/restaurant.css" rel="stylesheet"/>    
</head>
<body>

    <header class="header">
        <div class="container">

            <!-- Left -->
            <div class="header-left">
                <div class="logo">
                    <img src="images\burger.png" alt="logo">
                    <span>CodeLine Eats</span>
                </div>

                <div class="search-wrapper">
                    <div class="search-bar">
                        <img class="search-icon" src="images\search.png">
                        <input class="search-input" id="searchInput" placeholder="Search restaurants...">
                    </div>
                </div>
            </div>


            <!-- Right -->
            <div class="header-actions">

                <div class="location-picker">
                    <img class="action-icon" src="images/pin.png">
                    <span>Location</span>
                </div>

                <button class="cart-btn">
                    <img src="images/shopping-cart.png" alt="shping cart">
                </button>

            </div>

        </div>
    </header>

    <section class="container">
        <div class="filter-container">
            <button class="chip chip--active" data-cuisine="All">
                All
            </button>

            <button class="chip" data-cuisine="Arabic">
                Arabic
            </button>

             <button class="chip" data-cuisine="Indian">
                Indian
            </button>

            <button class="chip" data-cuisine="Italian">
                Italian
            </button>

            <button class="chip" data-cuisine="Bargars">
                Bargars
            </button>

            <button class="chip" data-cuisine="Japanese">
                Japanese
            </button>

            <button class="chip" data-cuisine="Healthy">
                Healthy
            </button>

        </div>

    </section>
    

    

    <main class="container restaurant-grid" id="container">

       <!-- ==========================
                 Loading
        =========================== -->
        <div id="restaurant-container">

        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <p id="errorMessage" class="message"></p>

        <div id="restaurants"></div>

    </div>

        <!-- ===========================
                 Error
         =========================== -->
        <div id="errorMessage"></div>
        
       <!--===========================
                  Successful
         =========================== -->
        <div class="card" id="card">
            <div class="card-image">
                <span class="badge-open">Open</span>
            </div>
            <div class="card-body">
                <div class="title-row">
                    <p class="title">Al Boom</p>
                    <div class="rating">
                        <img src="images\star.png" alt="star" class="star-icon">
                        <span>4.6</span>
                    </div>
                </div>

                <span class="badge-category">Arabic</span>

                <div class="stats-row">
                    <div>
                        <p class="stat-label">Delivery</p>
                        <p class="stat-value">0.500</p>
                    </div>
                    <div>
                        <p class="stat-label">Min</p>
                        <p class="stat-value">2.000</p>
                    </div>
                </div>

                <button class="btn-menu" id="menu">View Menu</button>
            </div>
        </div>

    </main>
    <script src="api.js"></script>
    <script src="app.js"></script>

</body>
</html>
